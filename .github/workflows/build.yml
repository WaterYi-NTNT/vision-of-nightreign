name: Build

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2
    
    - name: Set up MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Configure CMake
      run: cmake -B build -A x64
    
    - name: Build
      run: cmake --build build --config Release
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: VisionOfNightreign-build-${{ github.run_number }}
        path: build/bin/Release/*
        if-no-files-found: error

    - name: Create Release Zip
      if: startsWith(github.ref, 'refs/tags/')
      shell: pwsh
      run: |
        Compress-Archive -Path "build/bin/Release/*" -DestinationPath "VisionOfNightreign-${{ github.ref_name }}.zip"

    - name: Auto Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: VisionOfNightreign-${{ github.ref_name }}.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}